site_name: memsearch
site_description: "Cross-platform semantic memory for AI coding agents — markdown-first, backed by Milvus"
site_url: https://zilliztech.github.io/memsearch/

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: deep orange
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  font:
    text: Fira Code
    code: Fira Code
  logo: assets/logo-icon.jpg
  favicon: assets/logo-icon.jpg
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/terminal.css

repo_url: https://github.com/zilliztech/memsearch
repo_name: zilliztech/memsearch

nav:
  - Home:
    - Overview: index.md
    - Why memsearch: home/why.md
    - For Agent Users: home/for-users.md
    - For Agent Developers: home/for-developers.md
    - Configuration: home/configuration.md
    - Architecture: architecture.md
    - Design Philosophy: design-philosophy.md
    - Quickstart: getting-started.md
  - Claude Code Plugin:
    - Overview: platforms/claude-code/index.md
    - Installation: platforms/claude-code/installation.md
    - How It Works: platforms/claude-code/how-it-works.md
    - Memory Recall: platforms/claude-code/memory-recall.md
    - Troubleshooting: platforms/claude-code/troubleshooting.md
  - OpenClaw Plugin:
    - Overview: platforms/openclaw/index.md
    - Installation: platforms/openclaw/installation.md
    - How It Works: platforms/openclaw/how-it-works.md
    - Memory Tools: platforms/openclaw/memory-tools.md
  - OpenCode Plugin:
    - Overview: platforms/opencode/index.md
    - Installation: platforms/opencode/installation.md
    - How It Works: platforms/opencode/how-it-works.md
    - Memory Tools: platforms/opencode/memory-tools.md
  - Codex CLI Plugin:
    - Overview: platforms/codex/index.md
    - Installation: platforms/codex/installation.md
    - How It Works: platforms/codex/how-it-works.md
    - Memory Recall: platforms/codex/memory-recall.md
  - For Agent Developers:
    - CLI Reference: cli.md
    - Python API: python-api.md
    - Integrations: integrations.md
  - Platform Comparison: platforms/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
